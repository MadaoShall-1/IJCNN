services:
  vllm:
    build:
      context: .
      dockerfile: docker/vllm/Dockerfile
    image: exact-vllm:local
    container_name: exact-vllm
    ports:
      - "${VLLM_HOST_PORT:-8002}:8000"
    volumes:
      - ${USERPROFILE:-${HOME}}/.cache/huggingface:/root/.cache/huggingface
    environment:
      VLLM_MODEL: ${VLLM_MODEL:-Qwen/Qwen3-8B-AWQ}
      VLLM_SERVED_MODEL_NAME: ${VLLM_SERVED_MODEL_NAME:-qwen3-8b-awq}
      VLLM_MAX_MODEL_LEN: ${VLLM_MAX_MODEL_LEN:-2048}
      VLLM_GPU_MEMORY_UTILIZATION: ${VLLM_GPU_MEMORY_UTILIZATION:-0.60}
      VLLM_EXTRA_ARGS: ${VLLM_EXTRA_ARGS:---enforce-eager --generation-config vllm --max-num-seqs 1 --max-num-batched-tokens 2048 --no-enable-chunked-prefill --no-async-scheduling}
      VLLM_USE_V1: ${VLLM_USE_V1:-0}
      VLLM_USE_V2_MODEL_RUNNER: ${VLLM_USE_V2_MODEL_RUNNER:-0}
      VLLM_ENABLE_V1_MULTIPROCESSING: ${VLLM_ENABLE_V1_MULTIPROCESSING:-0}
      VLLM_USE_FLASHINFER_SAMPLER: ${VLLM_USE_FLASHINFER_SAMPLER:-0}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
