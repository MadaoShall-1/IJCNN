    <line x1="226" y1="276" x2="226" y2="296" stroke="#1F2328" stroke-width="2"/>
    <text x="182" y="335" text-anchor="middle" class="mid">k</text>
  </g>

  <!-- Right-bottom: block-wise SSM -->
