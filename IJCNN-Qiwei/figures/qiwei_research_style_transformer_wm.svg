<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1080" viewBox="0 0 1200 1080">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#1F2328"/>
    </marker>
    <marker id="arrowPink" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#D24F91"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#258BC5"/>
    </marker>
    <style>
      .title { font: 700 32px Arial, Helvetica, sans-serif; fill: #111; }
      .subtitle { font: italic 400 18px Arial, Helvetica, sans-serif; fill: #555; }
      .panel { fill: #F5F7FA; stroke: none; rx: 26; }
      .panelWarm { fill: #FFF7F1; stroke: none; rx: 26; }
      .panelCool { fill: #F8F3FB; stroke: none; rx: 26; }
      .block { stroke: none; rx: 8; }
      .blue { fill: #BEDCF1; }
      .green { fill: #BFE0D5; }
      .orange { fill: #F5C8AC; }
      .pink { fill: #F1B3D1; }
      .purple { fill: #D9C8EF; }
      .yellow { fill: #F8E7A5; }
      .white { fill: #FFFFFF; stroke: #1F2328; stroke-width: 2; rx: 8; }
      .label { font: 700 28px Arial, Helvetica, sans-serif; fill: #111; }
      .mid { font: 500 22px Arial, Helvetica, sans-serif; fill: #111; }
      .small { font: 400 16px Arial, Helvetica, sans-serif; fill: #333; }
      .tiny { font: 400 13px Arial, Helvetica, sans-serif; fill: #333; }
      .line { stroke: #1F2328; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #1F2328; stroke-width: 2.2; fill: none; stroke-dasharray: 7 7; marker-end: url(#arrow); }
      .thin { stroke: #1F2328; stroke-width: 2; fill: none; }
      .pinkLine { stroke: #D24F91; stroke-width: 4; fill: none; marker-end: url(#arrowPink); }
      .blueLine { stroke: #258BC5; stroke-width: 4; fill: none; marker-end: url(#arrowBlue); }
      .greenLine { stroke: #43AA5B; stroke-width: 4; fill: none; marker-end: url(#arrowBlue); }
      .orangeLine { stroke: #E18A32; stroke-width: 4; fill: none; marker-end: url(#arrowBlue); }
      .grid { fill: #DADADA; stroke: #202020; stroke-width: 1.8; }
      .gridA { fill: #A9D3B8; stroke: #202020; stroke-width: 1.8; }
      .gridB { fill: #C6B6DD; stroke: #202020; stroke-width: 1.8; }
    </style>
  </defs>

  <text x="600" y="54" text-anchor="middle" class="title">SSM-Enhanced Transformer Reasoner</text>
  <text x="600" y="86" text-anchor="middle" class="subtitle">Transformer backbone with latent world-model state injection</text>

  <!-- Left: model architecture -->
