  <text x="247" y="986" text-anchor="middle" class="small">SSM state injection</text>
  <text x="247" y="1018" text-anchor="middle" class="mid">K = W<tspan baseline-shift="sub" font-size="14">k</tspan>h + W<tspan baseline-shift="sub" font-size="14">ks</tspan>s</text>

  <!-- Right-top: semantic attention -->
  <rect x="560" y="130" width="565" height="395" class="panelWarm"/>
  <text x="842" y="190" text-anchor="middle" class="label">Semantic Local Attention</text>
  <text x="842" y="222" text-anchor="middle" class="subtitle">attention over nearby premise-answer tokens</text>

