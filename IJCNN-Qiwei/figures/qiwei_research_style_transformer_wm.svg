  <path d="M 283 154 L 283 108" class="line"/>
  <line x1="283" y1="154" x2="283" y2="770" stroke="#1F2328" stroke-width="3"/>

  <rect x="155" y="165" width="256" height="50" class="block blue"/>
  <text x="283" y="198" text-anchor="middle" class="mid">Scale</text>

  <rect x="155" y="235" width="256" height="50" class="block green"/>
  <text x="283" y="268" text-anchor="middle" class="mid">SwiGLU FFN</text>

  <rect x="155" y="305" width="256" height="50" class="block blue"/>
  <text x="283" y="338" text-anchor="middle" class="mid">RMSNorm</text>

  <circle cx="283" cy="385" r="17" fill="#FFFFFF" stroke="#1F2328" stroke-width="3"/>
  <line x1="272" y1="385" x2="294" y2="385" stroke="#1F2328" stroke-width="3"/>
  <line x1="283" y1="374" x2="283" y2="396" stroke="#1F2328" stroke-width="3"/>

  <rect x="155" y="425" width="256" height="70" class="block orange"/>
  <text x="283" y="453" text-anchor="middle" class="mid">Semantic Local</text>
  <text x="283" y="482" text-anchor="middle" class="mid">Attention</text>

  <rect x="155" y="515" width="256" height="50" class="block blue"/>
  <text x="283" y="548" text-anchor="middle" class="mid">RMSNorm</text>

  <circle cx="283" cy="595" r="17" fill="#FFFFFF" stroke="#1F2328" stroke-width="3"/>
  <line x1="272" y1="595" x2="294" y2="595" stroke="#1F2328" stroke-width="3"/>
  <line x1="283" y1="584" x2="283" y2="606" stroke="#1F2328" stroke-width="3"/>

  <rect x="155" y="635" width="256" height="50" class="block blue"/>
  <text x="283" y="668" text-anchor="middle" class="mid">Scale</text>

  <rect x="155" y="705" width="256" height="72" class="block pink"/>
  <text x="283" y="734" text-anchor="middle" class="mid">Block-Wise SSM</text>
  <text x="283" y="763" text-anchor="middle" class="mid">World Model</text>

  <rect x="155" y="797" width="256" height="50" class="block blue"/>
  <text x="283" y="830" text-anchor="middle" class="mid">RMSNorm</text>

  <text x="424" y="185" class="label">x N</text>
  <path d="M 428 205 C 474 295 474 720 428 815" class="dash"/>
  <path d="M 428 460 L 413 460" class="dash"/>
  <path d="M 428 741 L 413 741" class="dash"/>

